# NTU60 Cross-Subject 학습 config — PSP-Net (MB4-2D)
# MB4 의 입력만 2D (x, y) 로 축소한 변종 — 4-branch + 1×1 fusion 구조는 동일.

model:
  name: psp_mb4_2d
  num_classes: 60
  in_channels: 16     # 2D + use_body=-1 + bone_motion (4 stream × 2 axes × 2 body)
  base_ch: 64

data:
  dataset: ntu60
  benchmark: xsub     # 또는 xview (NTU60 Cross-View)
  npy_root: data/ntu60/npy
  frames_per_clip: 64
  num_joints: 25
  use_3d: false       # 핵심 차이 — 2D 입력 (x, y 만, z 좌표 미사용)
  use_body: -1
  use_bone_motion: true

training:
  optimizer: SGD
  lr: 0.05
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0001
  lr_schedule: cosine
  warmup_epochs: 5
  batch_size: 64
  num_workers: 8
  epochs: 120
  amp: false
  label_smoothing: 0.1
  mixup_alpha: 0.2
  mixup_prob: 0.5

augment:
  flip_prob: 0.5
  rotation_deg: 15     # 2D 회전 (x, y plane)
  scale_range: 0.15
  translation_range: 0.10
  coord_noise_sigma: 0.01
  temporal_shift: 5
  joint_dropout_p: 0.05

seed: 42
